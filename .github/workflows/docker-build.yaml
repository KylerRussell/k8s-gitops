name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "apps/ml-training/**"
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # Ensure you create DOCKERHUB_USERNAME and DOCKERHUB_TOKEN in your repository's Settings > Secrets and variables > Actions
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Ray Training Image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/ml-training
          file: ./apps/ml-training/Dockerfile
          push: true
          # The image will be tagged as latest.
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cascade-training:latest
