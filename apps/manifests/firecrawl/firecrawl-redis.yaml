apiVersion: apps/v1
kind: Deployment
metadata:
  name: firecrawl-redis
  namespace: firecrawl
  labels:
    app: firecrawl-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: firecrawl-redis
  template:
    metadata:
      labels:
        app: firecrawl-redis
    spec:
      containers:
        - name: redis
          image: redis:alpine
          command: ["redis-server", "--bind", "0.0.0.0"]
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: firecrawl-redis
  namespace: firecrawl
spec:
  selector:
    app: firecrawl-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
