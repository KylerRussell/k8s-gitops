apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: firecrawl-postgres-data
  namespace: firecrawl
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firecrawl-postgres
  namespace: firecrawl
  labels:
    app: firecrawl-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: firecrawl-postgres
  template:
    metadata:
      labels:
        app: firecrawl-postgres
    spec:
      containers:
        - name: postgres
          image: ghcr.io/firecrawl/nuq-postgres:latest
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
            - name: POSTGRES_DB
              value: "postgres"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: firecrawl-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: firecrawl-postgres
  namespace: firecrawl
spec:
  selector:
    app: firecrawl-postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
