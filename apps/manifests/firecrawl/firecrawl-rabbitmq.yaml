apiVersion: apps/v1
kind: Deployment
metadata:
  name: firecrawl-rabbitmq
  namespace: firecrawl
  labels:
    app: firecrawl-rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: firecrawl-rabbitmq
  template:
    metadata:
      labels:
        app: firecrawl-rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          command: ["rabbitmq-server"]
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "check_running"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "check_running"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: firecrawl-rabbitmq
  namespace: firecrawl
spec:
  selector:
    app: firecrawl-rabbitmq
  ports:
    - name: amqp
      protocol: TCP
      port: 5672
      targetPort: 5672
    - name: management
      protocol: TCP
      port: 15672
      targetPort: 15672
