apiVersion: apps/v1
kind: Deployment
metadata:
  name: firecrawl-api
  namespace: firecrawl
  labels:
    app: firecrawl-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: firecrawl-api
  template:
    metadata:
      labels:
        app: firecrawl-api
    spec:
      containers:
        - name: api
          image: ghcr.io/firecrawl/firecrawl:latest
          command: ["node", "dist/src/harness.js", "--start-docker"]
          ports:
            - containerPort: 3002
              name: http
          env:
            # Core configuration
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3002"
            - name: ENV
              value: "local"
            # Service URLs
            - name: REDIS_URL
              value: "redis://firecrawl-redis:6379"
            - name: REDIS_RATE_LIMIT_URL
              value: "redis://firecrawl-redis:6379"
            - name: PLAYWRIGHT_MICROSERVICE_URL
              value: "http://firecrawl-playwright:3000/scrape"
            - name: NUQ_RABBITMQ_URL
              value: "amqp://firecrawl-rabbitmq:5672"
            # PostgreSQL
            - name: POSTGRES_HOST
              value: "firecrawl-postgres"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
            - name: POSTGRES_DB
              value: "postgres"
            # Auth — disabled for internal-only access
            - name: USE_DB_AUTHENTICATION
              value: "false"
            # Worker configuration
            - name: NUM_WORKERS_PER_QUEUE
              value: "8"
            - name: CRAWL_CONCURRENT_REQUESTS
              value: "10"
            - name: MAX_CONCURRENT_JOBS
              value: "5"
            - name: BROWSER_POOL_SIZE
              value: "5"
            # Harness startup
            - name: HARNESS_STARTUP_TIMEOUT_MS
              value: "60000"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 3002
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: firecrawl-api
  namespace: firecrawl
spec:
  selector:
    app: firecrawl-api
  ports:
    - protocol: TCP
      port: 3002
      targetPort: 3002
